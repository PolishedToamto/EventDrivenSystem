
name: Order Service CI/CD pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - "OrderService/**"
      - ".github/workflows/OrderService.yml"
env:
  AWS_REGION: us-east-1                   # set this to your preferred AWS region, e.g. us-west-1
  ECR_REPOSITORY: event-driven-system/order_service           # set this to your Amazon ECR repository name
  #ECS_SERVICE: demo-service-sk1tc6aj                # set this to your Amazon ECS service name
  #ECS_CLUSTER: event-driven-system_order-service                # set this to your Amazon ECS cluster name
  #ECS_TASK_DEFINITION: OrderService/task-definition.json # set this to the path to your Amazon ECS task definition
  # file, e.g. .aws/task-definition.json
  #CONTAINER_NAME: main_container           # set this to the name of the container in the
  # containerDefinitions section of your task definition
  SERVICE_NAME: OrderService
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::370337710843:role/gitHubActionDeploy
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build jar
        run: mvn -f $SERVICE_NAME/pom.xml clean verify

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build a docker container and
          # push it to ECR so that it can
          # be deployed to ECS.
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./$SERVICE_NAME
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
